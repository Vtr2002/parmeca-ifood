<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parmeca — Calendário de Campanhas iFood</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bordo: #6B1E2E;
    --bordo-light: #8B2E42;
    --bordo-pale: #f5eaec;
    --bordo-mid: #c4909a;
    --bege: #F5F0E8;
    --bege-dark: #E8DFD0;
    --bege-border: #D4C8B4;
    --text-dark: #2C1A20;
    --text-mid: #6B4A52;
    --text-light: #9B7A84;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Jost', sans-serif; background: var(--bege); color: var(--text-dark); min-height: 100vh; }

  .top-bar { background: var(--bordo); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; flex-wrap: wrap; gap: 8px; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-logo { width: 36px; height: 36px; background: rgba(255,255,255,0.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 0.06em; }
  .brand-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.3); }
  .brand-sub { font-size: 11px; color: rgba(255,255,255,0.7); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 300; }
  .header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(255,255,255,0.75); font-family: 'Jost', sans-serif; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .btn-primary { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; padding: 7px 16px; font-size: 13px; cursor: pointer; font-family: 'Jost', sans-serif; letter-spacing: 0.04em; transition: background 0.15s; display: flex; align-items: center; gap: 6px; }
  .btn-primary:hover { background: rgba(255,255,255,0.25); }

  .controls-bar { background: var(--white); border-bottom: 1px solid var(--bege-border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 52px; }
  .nav-group { display: flex; align-items: center; gap: 10px; }
  .nav-btn { background: none; border: 1px solid var(--bege-border); border-radius: 7px; cursor: pointer; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; color: var(--text-mid); font-size: 16px; transition: background 0.15s; }
  .nav-btn:hover { background: var(--bege); }
  .month-label { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--bordo); min-width: 160px; text-align: center; letter-spacing: 0.02em; }
  .view-toggle { display: flex; border: 1px solid var(--bege-border); border-radius: 8px; overflow: hidden; }
  .view-btn { background: none; border: none; cursor: pointer; padding: 6px 16px; font-size: 12px; color: var(--text-mid); font-family: 'Jost', sans-serif; letter-spacing: 0.05em; transition: all 0.15s; text-transform: uppercase; }
  .view-btn.active { background: var(--bordo); color: #fff; }

  .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 1.2rem 2rem; background: var(--white); border-bottom: 1px solid var(--bege-border); }
  .summary-card { background: var(--bege); border-radius: 10px; padding: 12px 16px; text-align: center; border: 1px solid var(--bege-border); }
  .summary-num { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: var(--bordo); line-height: 1; }
  .summary-label { font-size: 10px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }

  .main { padding: 1.5rem 2rem; max-width: 1200px; margin: 0 auto; }

  .calendar-grid { background: var(--white); border: 1px solid var(--bege-border); border-radius: 14px; overflow: hidden; }
  .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--bordo); }
  .cal-day-name { text-align: center; padding: 10px 4px; font-size: 10px; color: rgba(255,255,255,0.8); letter-spacing: 0.12em; text-transform: uppercase; font-family: 'Jost', sans-serif; }
  .cal-body { display: grid; grid-template-columns: repeat(7, 1fr); border-left: 1px solid var(--bege-border); border-top: 1px solid var(--bege-border); }
  .cal-cell { border-right: 1px solid var(--bege-border); border-bottom: 1px solid var(--bege-border); min-height: 90px; padding: 8px; background: var(--white); }
  .cal-cell.other-month { background: var(--bege); }
  .cal-cell.today .day-num { background: var(--bordo); color: #fff; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .day-num { font-size: 12px; color: var(--text-mid); margin-bottom: 5px; font-family: 'Jost', sans-serif; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .campaign-pill { font-size: 10px; border-radius: 4px; padding: 2px 6px; margin-bottom: 3px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; font-family: 'Jost', sans-serif; display: block; transition: opacity 0.15s; }
  .campaign-pill:hover { opacity: 0.75; }
  .tipo-promocao     { background: #fde8ec; color: #7a1e30; }
  .tipo-lancamento   { background: #e8f0fd; color: #1e3a7a; }
  .tipo-sazonalidade { background: #fdf5e8; color: #7a5a1e; }
  .tipo-fidelizacao  { background: #e8fde8; color: #1e7a3a; }
  .tipo-outro        { background: #f0ece4; color: #6b4a52; }

  .list-view { display: flex; flex-direction: column; gap: 8px; }
  .list-item { background: var(--white); border: 1px solid var(--bege-border); border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: border-color 0.15s; }
  .list-item:hover { border-color: var(--bordo-mid); }
  .list-date-block { text-align: center; min-width: 48px; background: var(--bege); border-radius: 8px; padding: 8px; border: 1px solid var(--bege-border); }
  .list-date-day { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; color: var(--bordo); line-height: 1; }
  .list-date-mon { font-size: 10px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.1em; font-family: 'Jost', sans-serif; }
  .list-info { flex: 1; min-width: 0; }
  .list-title { font-size: 15px; font-weight: 500; color: var(--text-dark); font-family: 'Jost', sans-serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-meta { font-size: 12px; color: var(--text-light); margin-top: 3px; font-family: 'Jost', sans-serif; }
  .tipo-badge { font-size: 11px; border-radius: 6px; padding: 4px 10px; font-family: 'Jost', sans-serif; white-space: nowrap; letter-spacing: 0.04em; }

  .empty-state { text-align: center; padding: 3rem; color: var(--text-light); font-size: 14px; font-family: 'Jost', sans-serif; background: var(--white); border-radius: 14px; border: 1px solid var(--bege-border); }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }

  .status-bar { display: flex; align-items: center; gap: 8px; padding: 8px 2rem; font-size: 12px; font-family: 'Jost', sans-serif; color: var(--text-light); background: var(--white); border-bottom: 1px solid var(--bege-border); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
  .status-dot.online { background: #27ae60; }
  .status-dot.loading { background: #f39c12; animation: pulse 1s infinite; }
  .status-dot.error { background: #e74c3c; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(44,26,32,0.5); align-items: center; justify-content: center; z-index: 999; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: 16px; padding: 1.8rem; width: 100%; max-width: 440px; border: 1px solid var(--bege-border); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.4rem; }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700; color: var(--bordo); }
  .modal-close { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text-light); width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 6px; transition: background 0.15s; }
  .modal-close:hover { background: var(--bege); }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 10px; color: var(--text-mid); margin-bottom: 5px; display: block; font-family: 'Jost', sans-serif; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500; }
  .form-input { width: 100%; border: 1px solid var(--bege-border); border-radius: 8px; padding: 9px 12px; font-size: 13px; font-family: 'Jost', sans-serif; color: var(--text-dark); background: var(--bege); outline: none; transition: border-color 0.15s; }
  .form-input:focus { border-color: var(--bordo-mid); background: #fff; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  select.form-input { cursor: pointer; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.4rem; padding-top: 1rem; border-top: 1px solid var(--bege-border); }
  .btn-cancel { background: none; border: 1px solid var(--bege-border); border-radius: 8px; padding: 8px 18px; font-size: 13px; cursor: pointer; color: var(--text-mid); font-family: 'Jost', sans-serif; transition: background 0.15s; }
  .btn-cancel:hover { background: var(--bege); }
  .btn-save { background: var(--bordo); color: #fff; border: none; border-radius: 8px; padding: 8px 22px; font-size: 13px; cursor: pointer; font-family: 'Jost', sans-serif; transition: background 0.15s; }
  .btn-save:hover { background: var(--bordo-light); }
  .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-danger { background: #c0392b; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-family: 'Jost', sans-serif; }
  .detail-section { background: var(--bege); border-radius: 10px; padding: 1rem; margin-bottom: 1rem; }
  .detail-row { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; font-size: 13px; font-family: 'Jost', sans-serif; border-bottom: 1px solid var(--bege-border); }
  .detail-row:last-child { border-bottom: none; }
  .detail-key { color: var(--text-light); min-width: 80px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; padding-top: 1px; }
  .detail-val { color: var(--text-dark); flex: 1; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="brand">
    <div class="brand-logo">🍝</div>
    <div class="brand-name">Parmeca</div>
    <div class="brand-divider"></div>
    <div class="brand-sub">Campanhas iFood</div>
  </div>
  <div class="header-actions">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#fde8ec"></div>Promoção</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e8f0fd"></div>Lançamento</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fdf5e8"></div>Sazonalidade</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e8fde8"></div>Fidelização</div>
    </div>
    <button class="btn-primary" onclick="openModal()">+ Nova campanha</button>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot loading" id="status-dot"></div>
  <span id="status-text">Conectando ao banco de dados...</span>
</div>

<div class="controls-bar">
  <div class="nav-group">
    <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
    <span class="month-label" id="month-label"></span>
    <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="btn-cal" onclick="setView('cal')">Calendário</button>
    <button class="view-btn" id="btn-list" onclick="setView('list')">Lista</button>
  </div>
</div>

<div class="summary-bar" id="summary-bar"></div>
<div class="main" id="view-area"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Nova campanha</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Nome da campanha *</label>
      <input class="form-input" id="f-nome" placeholder="ex: Pizza do mês com 20% off" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Data início *</label>
        <input class="form-input" id="f-inicio" type="date" />
      </div>
      <div class="form-group">
        <label class="form-label">Data fim</label>
        <input class="form-input" id="f-fim" type="date" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Tipo</label>
      <select class="form-input" id="f-tipo">
        <option value="promocao">Promoção</option>
        <option value="lancamento">Lançamento</option>
        <option value="sazonalidade">Sazonalidade</option>
        <option value="fidelizacao">Fidelização</option>
        <option value="outro">Outro</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Desconto / Benefício</label>
      <input class="form-input" id="f-desconto" placeholder="ex: 20% off, frete grátis, brinde" />
    </div>
    <div class="form-group">
      <label class="form-label">Observação</label>
      <input class="form-input" id="f-obs" placeholder="ex: válido apenas sexta e sábado" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btn-save" onclick="saveCampaign()">Salvar campanha</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="detail-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="detail-title"></div>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-section" id="detail-content"></div>
    <div class="modal-actions">
      <button class="btn-danger" onclick="deleteFromDetail()">Excluir</button>
      <button class="btn-cancel" onclick="closeDetail()">Fechar</button>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL = 'https://jlujwzvpjxdnzulndecs.supabase.co';
var SUPABASE_KEY = 'sb_publishable_nc7suAevy680DnEOAIDqKw_IcAD3nTp';
var TABLE = 'campanhas_ifood';

var MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var MONTHS_SHORT = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
var DAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
var TIPOS = {
  promocao:     { label: 'Promoção',     bg: '#fde8ec', color: '#7a1e30' },
  lancamento:   { label: 'Lançamento',   bg: '#e8f0fd', color: '#1e3a7a' },
  sazonalidade: { label: 'Sazonalidade', bg: '#fdf5e8', color: '#7a5a1e' },
  fidelizacao:  { label: 'Fidelização',  bg: '#e8fde8', color: '#1e7a3a' },
  outro:        { label: 'Outro',        bg: '#f0ece4', color: '#6b4a52' }
};

var today = new Date();
var curYear = today.getFullYear();
var curMonth = today.getMonth();
var view = 'cal';
var campaigns = [];
var detailId = null;

function setStatus(state, msg) {
  document.getElementById('status-dot').className = 'status-dot ' + state;
  document.getElementById('status-text').textContent = msg;
}

async function sbFetch(method, path, body) {
  var opts = {
    method: method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    }
  };
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch(SUPABASE_URL + '/rest/v1/' + path, opts);
  if (!res.ok) { var e = await res.text(); throw new Error(e); }
  if (res.status === 204) return null;
  return res.json();
}

async function loadCampaigns() {
  setStatus('loading', 'Carregando campanhas...');
  try {
    var data = await sbFetch('GET', TABLE + '?order=inicio.asc');
    campaigns = data || [];
    setStatus('online', 'Conectado — ' + campaigns.length + ' campanha(s) salva(s)');
    render();
  } catch(e) {
    setStatus('error', 'Erro ao conectar. Verifique as permissões no Supabase.');
    campaigns = [];
    render();
  }
}

function setView(v) {
  view = v;
  document.getElementById('btn-cal').className = 'view-btn' + (v==='cal'?' active':'');
  document.getElementById('btn-list').className = 'view-btn' + (v==='list'?' active':'');
  render();
}

function changeMonth(d) {
  curMonth += d;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  if (curMonth < 0)  { curMonth = 11; curYear--; }
  render();
}

function getMonthCampaigns(y, m) {
  var ms = y+'-'+pad(m+1)+'-01', me = y+'-'+pad(m+1)+'-31';
  return campaigns.filter(function(c){ return c.inicio <= me && (!c.fim || c.fim >= ms); });
}

function renderSummary() {
  var mc = getMonthCampaigns(curYear, curMonth);
  var ct = { promocao:0, lancamento:0, sazonalidade:0, fidelizacao:0, outro:0 };
  mc.forEach(function(c){ if(ct[c.tipo]!==undefined) ct[c.tipo]++; else ct.outro++; });
  document.getElementById('summary-bar').innerHTML =
    '<div class="summary-card"><div class="summary-num">'+mc.length+'</div><div class="summary-label">Total do mês</div></div>'+
    '<div class="summary-card"><div class="summary-num" style="color:#7a1e30">'+ct.promocao+'</div><div class="summary-label">Promoções</div></div>'+
    '<div class="summary-card"><div class="summary-num" style="color:#1e3a7a">'+ct.lancamento+'</div><div class="summary-label">Lançamentos</div></div>'+
    '<div class="summary-card"><div class="summary-num" style="color:#1e7a3a">'+(ct.fidelizacao+ct.sazonalidade+ct.outro)+'</div><div class="summary-label">Outros tipos</div></div>';
}

function getDayCampaigns(y, m, d) {
  var str = y+'-'+pad(m+1)+'-'+pad(d);
  return campaigns.filter(function(c){ return c.inicio <= str && (!c.fim || c.fim >= str); });
}

function renderCalendar() {
  document.getElementById('month-label').textContent = MONTHS[curMonth]+' '+curYear;
  var firstDay = new Date(curYear, curMonth, 1).getDay();
  var daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
  var prevDays = new Date(curYear, curMonth, 0).getDate();
  var todayStr = today.getFullYear()+'-'+pad(today.getMonth()+1)+'-'+pad(today.getDate());
  var cells = [];
  for (var i = firstDay-1; i >= 0; i--) cells.push({d: prevDays-i, cur: false});
  for (var i = 1; i <= daysInMonth; i++) cells.push({d: i, cur: true});
  while (cells.length % 7 !== 0) cells.push({d: cells.length-daysInMonth-firstDay+1, cur: false});
  var html = '<div class="calendar-grid"><div class="cal-header">';
  DAYS.forEach(function(d){ html += '<div class="cal-day-name">'+d+'</div>'; });
  html += '</div><div class="cal-body">';
  cells.forEach(function(cell){
    var isToday = cell.cur && curYear+'-'+pad(curMonth+1)+'-'+pad(cell.d) === todayStr;
    var camps = cell.cur ? getDayCampaigns(curYear, curMonth, cell.d) : [];
    html += '<div class="cal-cell'+(cell.cur?'':' other-month')+(isToday?' today':'')+'"><div class="day-num">'+cell.d+'</div>';
    camps.forEach(function(c){ html += '<span class="campaign-pill tipo-'+c.tipo+'" onclick="openDetail('+c.id+')" title="'+esc(c.nome)+'">'+esc(c.nome)+'</span>'; });
    html += '</div>';
  });
  html += '</div></div>';
  document.getElementById('view-area').innerHTML = html;
}

function renderList() {
  document.getElementById('month-label').textContent = MONTHS[curMonth]+' '+curYear;
  var mc = getMonthCampaigns(curYear, curMonth);
  if (!mc.length) {
    document.getElementById('view-area').innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div>Nenhuma campanha em '+MONTHS[curMonth]+'.<br>Clique em "+ Nova campanha" para adicionar.</div>';
    return;
  }
  var html = '<div class="list-view">';
  mc.forEach(function(c){
    var t = TIPOS[c.tipo]||TIPOS.outro, p = c.inicio.split('-');
    var range = (c.fim&&c.fim!==c.inicio)?fmtDate(c.inicio)+' – '+fmtDate(c.fim):fmtDate(c.inicio);
    html += '<div class="list-item" onclick="openDetail('+c.id+')">'+
      '<div class="list-date-block"><div class="list-date-day">'+p[2]+'</div><div class="list-date-mon">'+MONTHS_SHORT[parseInt(p[1])-1]+'</div></div>'+
      '<div class="list-info"><div class="list-title">'+esc(c.nome)+'</div><div class="list-meta">'+range+(c.desconto?' · '+esc(c.desconto):'')+'</div></div>'+
      '<span class="tipo-badge" style="background:'+t.bg+';color:'+t.color+'">'+t.label+'</span></div>';
  });
  document.getElementById('view-area').innerHTML = html + '</div>';
}

function openModal() {
  ['f-nome','f-inicio','f-fim','f-desconto','f-obs'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('f-tipo').value = 'promocao';
  var btn = document.getElementById('btn-save');
  btn.disabled = false; btn.textContent = 'Salvar campanha';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(function(){ document.getElementById('f-nome').focus(); }, 50);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

async function saveCampaign() {
  var nome = document.getElementById('f-nome').value.trim();
  var inicio = document.getElementById('f-inicio').value;
  if (!nome||!inicio) { alert('Preencha o nome e a data de início.'); return; }
  var btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'Salvando...';
  try {
    var result = await sbFetch('POST', TABLE, {
      nome: nome, inicio: inicio,
      fim: document.getElementById('f-fim').value||null,
      tipo: document.getElementById('f-tipo').value,
      desconto: document.getElementById('f-desconto').value.trim()||null,
      obs: document.getElementById('f-obs').value.trim()||null
    });
    if (result&&result[0]) campaigns.push(result[0]);
    campaigns.sort(function(a,b){ return a.inicio.localeCompare(b.inicio); });
    setStatus('online', 'Conectado — '+campaigns.length+' campanha(s) salva(s)');
    closeModal(); render();
  } catch(e) {
    alert('Erro ao salvar: '+e.message);
    btn.disabled=false; btn.textContent='Salvar campanha';
  }
}

function openDetail(id) {
  detailId = id;
  var c = campaigns.find(function(x){ return x.id===id; });
  if (!c) return;
  var t = TIPOS[c.tipo]||TIPOS.outro;
  document.getElementById('detail-title').textContent = c.nome;
  var html = '<div class="detail-row"><span class="detail-key">Tipo</span><span class="detail-val"><span class="tipo-badge" style="background:'+t.bg+';color:'+t.color+'">'+t.label+'</span></span></div>';
  html += '<div class="detail-row"><span class="detail-key">Início</span><span class="detail-val">'+fmtDate(c.inicio)+'</span></div>';
  if (c.fim) html += '<div class="detail-row"><span class="detail-key">Fim</span><span class="detail-val">'+fmtDate(c.fim)+'</span></div>';
  if (c.desconto) html += '<div class="detail-row"><span class="detail-key">Benefício</span><span class="detail-val">'+esc(c.desconto)+'</span></div>';
  if (c.obs) html += '<div class="detail-row"><span class="detail-key">Obs.</span><span class="detail-val">'+esc(c.obs)+'</span></div>';
  document.getElementById('detail-content').innerHTML = html;
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail() { document.getElementById('detail-overlay').classList.remove('open'); detailId=null; }

async function deleteFromDetail() {
  if (!detailId) return;
  var c = campaigns.find(function(x){ return x.id===detailId; });
  if (!confirm('Excluir "'+c.nome+'"?')) return;
  try {
    await sbFetch('DELETE', TABLE+'?id=eq.'+detailId);
    campaigns = campaigns.filter(function(x){ return x.id!==detailId; });
    setStatus('online', 'Conectado — '+campaigns.length+' campanha(s) salva(s)');
    closeDetail(); render();
  } catch(e) { alert('Erro ao excluir: '+e.message); }
}

function pad(n){ return String(n).padStart(2,'0'); }
function fmtDate(s){ if(!s) return ''; var p=s.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function render(){ renderSummary(); view==='cal'?renderCalendar():renderList(); }

document.addEventListener('keydown', function(e){ if(e.key==='Escape'){closeModal();closeDetail();} });
loadCampaigns();
</script>
</body>
</html>
